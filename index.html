<!DOCTYPE html>
<html lang="en">
<head>
    <title>E.L.L.A Cloud Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#FF5722">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary-color: #FF5722;
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
            --text-muted: #8E8E93;
            --heart-color: #FF2D55;
            --oxy-color: #007AFF;
            --env-color: #34C759;
            --temp-color: #FF9500;
            --radius-lg: 32px;
            --shadow-soft: 0 4px 12px rgba(0,0,0,0.05);
        }
        .dark-mode {
            --bg-color: #000000;
            --card-bg: #1C1C1E;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --shadow-soft: 0 4px 12px rgba(0,0,0,0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Roboto Condensed', sans-serif;
            padding: 10px;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }
        .app-header {
            text-align: center;
            margin-top: 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
        }
        .app-header span { color: var(--primary-color); }
        .theme-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            width: 36px;
            height: 36px;
        }
        .status-indicator {
            position: fixed;
            top: 22px;
            left: 15px;
            width: 10px;
            height: 10px;
            background: #FF3B30;
            border-radius: 50%;
            z-index: 200;
            transition: 0.3s;
            box-shadow: 0 0 8px rgba(255,59,48,0.5);
        }
        .status-connected {
            background: #34C759;
            box-shadow: 0 0 12px rgba(52,199,89,0.6);
        }
        .main-content {
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
        }
        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .sensor-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 22px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(128,128,128,0.2);
        }
        .card-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .card-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1;
        }
        .card-unit {
            font-size: 1rem;
            color: var(--text-muted);
            margin-left: 2px;
        }
        .icon {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }
        .card-icon-wrapper {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--bg-color);
        }
    </style>
</head>
<body class="dark-mode">
    <div class="status-indicator" id="status"></div>
    <button class="theme-toggle" id="themeToggle">
        <svg class="icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
    </button>

    <header class="app-header">E.L.L.A <span>CLOUD</span></header>

    <div class="main-content">
        <div class="sensor-grid">
            <!-- Heart Rate -->
            <div class="sensor-card">
                <div class="card-label">Heart Rate</div>
                <div><span class="card-value" id="hrVal">--</span><span class="card-unit">BPM</span></div>
                <div class="card-icon-wrapper">
                    <svg class="icon" viewBox="0 0 24 24" style="color: var(--heart-color);">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                </div>
            </div>
            <!-- SpO2 -->
            <div class="sensor-card">
                <div class="card-label">O2 Saturation</div>
                <div><span class="card-value" id="spo2Val">--</span><span class="card-unit">%</span></div>
                <div class="card-icon-wrapper">
                    <svg class="icon" viewBox="0 0 24 24" style="color: var(--oxy-color);">
                        <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
                    </svg>
                </div>
            </div>
            <!-- Body Temp -->
            <div class="sensor-card">
                <div class="card-label">Body Temp</div>
                <div><span class="card-value" id="bodyTempVal">--</span><span class="card-unit">°C</span></div>
                <div class="card-icon-wrapper">
                    <svg class="icon" viewBox="0 0 24 24" style="color: var(--temp-color);">
                        <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"></path>
                    </svg>
                </div>
            </div>
            <!-- Env Temp -->
            <div class="sensor-card">
                <div class="card-label">Environment</div>
                <div><span class="card-value" id="envTempVal">--</span><span class="card-unit">°C</span></div>
                <div class="card-icon-wrapper">
                    <svg class="icon" viewBox="0 0 24 24" style="color: var(--env-color);">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                    </svg>
                </div>
            </div>
            <!-- Humidity -->
            <div class="sensor-card">
                <div class="card-label">Humidity</div>
                <div><span class="card-value" id="humidityVal">--</span><span class="card-unit">%</span></div>
                <div class="card-icon-wrapper">
                    <svg class="icon" viewBox="0 0 24 24" style="color: var(--oxy-color);">
                        <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
                    </svg>
                </div>
            </div>
            <!-- AQI placeholder -->
            <div class="sensor-card">
                <div class="card-label">AQI</div>
                <div><span class="card-value" id="aqiVal">--</span><span class="card-unit">Score</span></div>
                <div class="card-icon-wrapper">
                    <svg class="icon" viewBox="0 0 24 24" style="color:#9C27B0;">
                        <path d="M8 16.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zM14 6.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zM21.5 10a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"></path>
                    </svg>
                </div>
            </div>
        </div>
        <div class="last-update" style="text-align:center; margin-top:10px; color:var(--text-muted);">
            Last update: <span id="lastUpdate">--</span>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://ella-b927d-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const statusEl = document.getElementById('status');
        database.ref('.info/connected').on('value', (snap) => {
            statusEl.classList.toggle('status-connected', snap.val());
        });

        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        let darkMode = localStorage.getItem('darkMode') !== 'false';
        function setTheme(mode) { body.classList.toggle('dark-mode', mode); localStorage.setItem('darkMode', mode); }
        themeToggle.addEventListener('click', () => { darkMode = !darkMode; setTheme(darkMode); });
        setTheme(darkMode);

        // DOM elements for sensor values
        const hrVal = document.getElementById('hrVal');
        const spo2Val = document.getElementById('spo2Val');
        const bodyTempVal = document.getElementById('bodyTempVal');
        const envTempVal = document.getElementById('envTempVal');
        const humidityVal = document.getElementById('humidityVal');
        const aqiVal = document.getElementById('aqiVal');
        const lastUpdate = document.getElementById('lastUpdate');
        database.ref('sensors').orderByChild('timestamp').limitToLast(1).on('child_added', (snap) => {
            const data = snap.val();
            if (!data) return;

            hrVal.textContent = data.heartRate || '--';
            spo2Val.textContent = data.spo2 || '--';
            bodyTempVal.textContent = data.bodyTemp ? data.bodyTemp.toFixed(1) : '--';
            envTempVal.textContent = data.temperature ? data.temperature.toFixed(1) : '--';
            humidityVal.textContent = data.humidity ? Math.round(data.humidity) : '--';
            aqiVal.textContent = data.aqi || '--';

            if (data.timestamp) {
                lastUpdate.textContent = new Date(data.timestamp).toLocaleTimeString();
            }
        });
    </script>
</body>
</html>
